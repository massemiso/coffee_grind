# Use H2 in-memory mode
spring.datasource.url=jdbc:h2:mem:daily_grind_test;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema automatically for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Turn off SQL script initialization for tests to avoid conflicts
spring.sql.init.mode=never